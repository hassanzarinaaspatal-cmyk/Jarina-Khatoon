workflows:
  android-workflow:
    name: Hasan Babu Clinic Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.hasanbabu.clinic"
    working_directory: mobile_app
    scripts:
      - name: Recreate Android platform files
        script: |
          flutter create --platforms=android --org com.hasanbabu .
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk