workflows:
  android-workflow:
    name: Hasan Babu Clinic Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.hasanbabu.clinic"
    working_directory: mobile_app
    scripts:
      - name: Recreate Android platform files
        script: |
          flutter create --platforms=android --org com.hasanbabu .
      - name: Add Internet permission
        script: |
          python3 - <<'PYEOF'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r") as f:
              content = f.read()
          perm = '    <uses-permission android:name="android.permission.INTERNET"/>\n'
          if "android.permission.INTERNET" not in content:
              idx = content.find(">") + 1
              content = content[:idx] + "\n" + perm + content[idx:]
          with open(path, "w") as f:
              f.write(content)
          PYEOF
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk